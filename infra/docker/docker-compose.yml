services:
  self-learning-console-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: runtime
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-public.ecr.aws/docker/library/node:20-slim}
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}
    container_name: self-learning-console-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      APP_NAME: self-learning-console
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: INFO
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_QUESTION_MODEL: ${OLLAMA_QUESTION_MODEL:-qwen2.5:14b}
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-45}
      OLLAMA_INSIGHT_TIMEOUT_SECONDS: ${OLLAMA_INSIGHT_TIMEOUT_SECONDS:-35}
      OLLAMA_QUESTION_TIMEOUT_SECONDS: ${OLLAMA_QUESTION_TIMEOUT_SECONDS:-35}
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: training_chunks
      LOCAL_INDEX_PATH: /app/data/indexes/local_index.json
      INGESTION_REPORT_PATH: /app/data/indexes/ingestion_report.json
      INGESTION_SOURCE_DIR: ${INGESTION_SOURCE_DIR:-/workspace/Resource}
      CHUNK_SIZE_CHARS: 1000
      CHUNK_OVERLAP_CHARS: 150
      RETRIEVAL_TOP_K: 3
      RETRIEVAL_ANSWER_TIMEOUT_SECONDS: ${RETRIEVAL_ANSWER_TIMEOUT_SECONDS:-30}
      EXACT_CACHE_BACKEND: ${EXACT_CACHE_BACKEND:-memory}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUERY_SIMILARITY_TRACKING_ENABLED: ${QUERY_SIMILARITY_TRACKING_ENABLED:-true}
      DEPLOY_INTEL_ENABLE_ON_DEPLOY: ${DEPLOY_INTEL_ENABLE_ON_DEPLOY:-true}
      DEPLOY_INTEL_FAST_MODE: ${DEPLOY_INTEL_FAST_MODE:-true}
      DEPLOY_INTEL_MAX_DOCS: ${DEPLOY_INTEL_MAX_DOCS:-0}
      WARM_CACHE_MAX_DOCS: ${WARM_CACHE_MAX_DOCS:-0}
      DEPLOY_INTEL_BLOCKING_ON_DEPLOY: ${DEPLOY_INTEL_BLOCKING_ON_DEPLOY:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../../data:/app/data
      - ../../Resource:/workspace/Resource
      - ../../Resources:/workspace/Resources
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  self-learning-console-tests:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: test
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-public.ecr.aws/docker/library/node:20-slim}
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}
    container_name: self-learning-console-tests
    profiles: ["test"]
    environment:
      APP_ENV: test
      LLM_PROVIDER: ollama
      VECTOR_BACKEND: memory
      EXACT_CACHE_BACKEND: memory
    volumes:
      - ../../tests:/app/tests

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: self-learning-console-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../../data/qdrant:/qdrant/storage

  redis:
    image: redis:7.4-alpine
    container_name: self-learning-console-redis
    ports:
      - "6379:6379"
    profiles: ["redis"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  ollama:
    profiles: ["container-ollama"]
    image: ollama/ollama:0.5.7
    container_name: self-learning-console-ollama
    ports:
      - "11434:11434"
    volumes:
      - ../../data/ollama:/root/.ollama

  ollama-init:
    profiles: ["container-ollama"]
    image: ollama/ollama:0.5.7
    container_name: self-learning-console-ollama-init
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -c
    command: ollama pull "${OLLAMA_MODEL:-llama3.1:8b}" && ollama pull "${EMBEDDING_MODEL:-nomic-embed-text}"