# This is the Docker Compose override file for local development
# Merge this with docker-compose.yml when running locally
# Usage: docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.override.yml up

services:
  training-agent-api:
    # Override for local development with hot reload
    volumes:
      - ../../app:/app/app
      - ../../scripts:/app/scripts
      - ../../.env:/app/.env
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    command: >
      sh -c "pip install -e . &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  ollama:
    # Keep ollama accessible for development
    ports:
      - "11434:11434"

  qdrant:
    # Keep qdrant accessible for development
    ports:
      - "6333:6333"
    # Store data locally for persistence during development
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
    driver: local
